services:
  mcp_server:
    build: ./mcp_server
    env_file: ./mcp_server/.env
    ports:
      - "8001:8001"

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      # Reach the MCP server by its compose service name (overrides .env).
      - MCP_URL=http://mcp_server:8001/mcp
    ports:
      - "8000:8000"
    depends_on:
      - mcp_server

  frontend:
    build: ./frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
